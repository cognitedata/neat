# Three containers forming a requires cycle: A -> B -> C -> A
# C -> A is manual (no __auto suffix) to test mixed auto/manual cycle handling.
# B also has an extra constraint to D (not part of cycle) to test fix loop iteration.
- space: my_space
  externalId: ContainerA
  usedFor: node
  properties:
    fieldA:
      immutable: false
      nullable: true
      type:
        type: text
        list: false
  constraints:
    ContainerB__auto:
      constraintType: requires
      require:
        space: my_space
        externalId: ContainerB
        type: container

- space: my_space
  externalId: ContainerB
  usedFor: node
  properties:
    fieldB:
      immutable: false
      nullable: true
      type:
        type: text
        list: false
  constraints:
    ContainerC__auto:
      constraintType: requires
      require:
        space: my_space
        externalId: ContainerC
        type: container
    ContainerD__auto:
      constraintType: requires
      require:
        space: my_space
        externalId: ContainerD
        type: container

- space: my_space
  externalId: ContainerC
  usedFor: node
  properties:
    fieldC:
      immutable: false
      nullable: true
      type:
        type: text
        list: false
  constraints:
    ContainerA_req:
      constraintType: requires
      require:
        space: my_space
        externalId: ContainerA
        type: container

- space: my_space
  externalId: ContainerD
  usedFor: node
  properties:
    fieldD:
      immutable: false
      nullable: true
      type:
        type: text
        list: false
